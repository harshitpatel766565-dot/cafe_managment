<section id="menu" class="py-20 bg-white">

    <div class="max-w-7xl mx-auto px-6">

        <h2 class="text-5xl font-bold text-center text-gray-800">
            Our Special Menu
        </h2>

        <p class="text-center text-gray-600 mt-4 mb-12">
            Freshly prepared with love and premium ingredients.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            {% for menu in menus %}

            <div class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl hover:-translate-y-2 transition duration-300">

                {% if menu.image %}
                <img src="{{ menu.image.url }}"
                     class="w-full h-64 object-cover">
                {% endif %}

                <div class="p-6">

                    <h3 class="text-2xl font-bold">
                        {{ menu.name }}
                    </h3>

                    <p class="text-gray-600 mt-3">
                        {{ menu.description }}
                    </p>

                    <div class="flex justify-between items-center mt-6">

                        <span class="text-2xl font-bold text-amber-700">
                            ₹ {{ menu.price }}
                        </span>

                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">
                            {{ menu.category.name }}
                        </span>

                    </div>

                    <button class="mt-6 w-full bg-amber-700 hover:bg-amber-800 text-white py-3 rounded-xl">
                        Add To Cart
                    </button>

                </div>

            </div>

            {% empty %}

            <h2 class="text-center text-2xl col-span-3">
                No Menu Available
            </h2>

            {% endfor %}

        </div>

    </div>

</section>
