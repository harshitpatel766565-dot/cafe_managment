{% load static %}

<section id="about" class="py-20 bg-white">

    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">

        <!-- Left Side Image -->
        <div>
            <img src="{% static 'about.png' %}"
                 alt="Cafe"
                 class="rounded-2xl shadow-2xl w-full">
        </div>

        <!-- Right Side Content -->
        <div>

            <h2 class="text-5xl font-bold text-gray-800">
                About CafeHub
            </h2>

            <p class="mt-6 text-gray-600 text-lg leading-8">

                Welcome to CafeHub, where every cup tells a story.
                We serve freshly brewed coffee, delicious meals,
                and homemade desserts in a warm and cozy atmosphere.

            </p>

            <div class="grid grid-cols-2 gap-6 mt-10">

                <div class="bg-amber-100 rounded-xl p-6 text-center">

                    <h3 class="text-3xl font-bold text-amber-700">
                        10+
                    </h3>

                    <p>Years Experience</p>

                </div>

                <div class="bg-amber-100 rounded-xl p-6 text-center">

                    <h3 class="text-3xl font-bold text-amber-700">
                        5000+
                    </h3>

                    <p>Happy Customers</p>

                </div>

                <div class="bg-amber-100 rounded-xl p-6 text-center">

                    <h3 class="text-3xl font-bold text-amber-700">
                        100+
                    </h3>

                    <p>Menu Items</p>

                </div>

                <div class="bg-amber-100 rounded-xl p-6 text-center">

                    <h3 class="text-3xl font-bold text-amber-700">
                        4.9★
                    </h3>

                    <p>Customer Rating</p>

                </div>

            </div>

        </div>

    </div>

</section>
