<section id="contact" class="py-20 bg-gray-100">

    <div class="max-w-7xl mx-auto px-6">

        <h2 class="text-5xl font-bold text-center text-gray-800">
            Contact Us
        </h2>

        <p class="text-center text-gray-600 mt-4 mb-12">
            We'd love to hear from you.
        </p>

        <div class="grid md:grid-cols-2 gap-10">

            <!-- Left Side -->
            <div class="bg-white rounded-2xl shadow-lg p-8">

                <h3 class="text-3xl font-bold mb-8">
                    Get In Touch
                </h3>

                <div class="space-y-6">

                    <div>
                        <h4 class="font-bold text-xl">📍 Address</h4>
                        <p class="text-gray-600">
                            123 Coffee Street, Udaipur, Rajasthan
                        </p>
                    </div>

                    <div>
                        <h4 class="font-bold text-xl">📞 Phone</h4>
                        <p class="text-gray-600">
                            +91 9876543210
                        </p>
                    </div>

                    <div>
                        <h4 class="font-bold text-xl">📧 Email</h4>
                        <p class="text-gray-600">
                            info@cafehub.com
                        </p>
                    </div>

                    <div>
                        <h4 class="font-bold text-xl">🕒 Opening Hours</h4>
                        <p class="text-gray-600">
                            Monday - Sunday
                        </p>

                        <p class="text-gray-600">
                            8:00 AM - 11:00 PM
                        </p>
                    </div>

                </div>

            </div>

            <!-- Right Side -->
            <div class="bg-white rounded-2xl shadow-lg p-8">

                <h3 class="text-3xl font-bold mb-8">
                    Send Message
                </h3>

                <form method="POST" action="{% url 'contact' %}">

                    {% csrf_token %}

                    <input
                        type="text"
                        name="name"
                        placeholder="Your Name"
                        class="w-full border p-3 rounded-lg mb-4">

                    <input
                        type="email"
                        name="email"
                        placeholder="Your Email"
                        class="w-full border p-3 rounded-lg mb-4">

                    <input
                        type="text"
                        name="subject"
                        placeholder="Subject"
                        class="w-full border p-3 rounded-lg mb-4">

                    <textarea
                        rows="5"
                        name="message"
                        placeholder="Your Message"
                        class="w-full border p-3 rounded-lg mb-4"></textarea>

                    <button
                        class="w-full bg-amber-700 hover:bg-amber-800 text-white py-3 rounded-lg">

                        Send Message

                    </button>

                </form>

            </div>

        </div>

    </div>

</section>
<section class="pb-20 bg-gray-100">

    <div class="max-w-7xl mx-auto px-6">

        <div class="rounded-2xl overflow-hidden shadow-xl">

            <iframe
                src="https://www.google.com/maps/embed?pb=YOUR_GOOGLE_MAP_EMBED_LINK"
                width="100%"
                height="450"
                style="border:0;"
                loading="lazy">
            </iframe>

        </div>

    </div>

</section>
