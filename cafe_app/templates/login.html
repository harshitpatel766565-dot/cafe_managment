{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">

    <h1 class="text-4xl font-bold text-center mb-8">
        Login
    </h1>

    {% if error %}
    <p class="text-red-500 text-center mb-4">
        {{ error }}
    </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="email"
            name="email"
            placeholder="Email"
            class="w-full border p-3 rounded-lg mb-4">

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="w-full border p-3 rounded-lg mb-4">

        <button
            class="w-full bg-amber-700 hover:bg-amber-800 text-white py-3 rounded-lg">

            Login

        </button>

    </form>

</div>

{% endblock %}
