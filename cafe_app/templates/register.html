{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-100 to-amber-300 py-20">

    <div class="bg-white shadow-2xl rounded-3xl w-full max-w-md p-10">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-amber-700">
                ☕ CafeHub
            </h1>

            <p class="text-gray-500 mt-2">
                Create your account
            </p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="first_name"
                placeholder="First Name"
                class="w-full border border-gray-300 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500">

            <input
                type="text"
                name="last_name"
                placeholder="Last Name"
                class="w-full border border-gray-300 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500">

            <input
                type="text"
                name="username"
                placeholder="Username"
                class="w-full border border-gray-300 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                class="w-full border border-gray-300 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-amber-500">

            <input
                type="password"
                name="password"
                placeholder="Password"
                class="w-full border border-gray-300 rounded-xl p-3 mb-6 focus:outline-none focus:ring-2 focus:ring-amber-500">

            <button
                type="submit"
                class="w-full bg-amber-700 hover:bg-amber-800 text-white py-3 rounded-xl font-semibold transition duration-300">

                Register

            </button>

        </form>

        <p class="text-center text-gray-600 mt-6">
            Already have an account?

            <a href="{% url 'login' %}"
               class="text-amber-700 font-semibold hover:underline">
                Login
            </a>
        </p>

    </div>

</div>

{% endblock %}
