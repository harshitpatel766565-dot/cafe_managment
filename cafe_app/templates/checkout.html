{% extends 'base.html' %}

{% block title %}
Checkout
{% endblock %}

{% block content %}

<section class="min-h-screen bg-gray-100 py-20">

    <div class="max-w-2xl mx-auto px-6">

        <!-- Checkout Card -->
        <div class="bg-white shadow-2xl rounded-3xl p-10">

            <h1 class="text-4xl font-bold text-center text-amber-700 mb-8">
                🛍️ Checkout
            </h1>

            <form method="POST">

                {% csrf_token %}

                <input
                    type="text"
                    name="name"
                    placeholder="Full Name"
                    required
                    class="w-full border border-gray-300 p-4 rounded-xl mb-5 focus:outline-none focus:ring-2 focus:ring-amber-500">

                <input
                    type="text"
                    name="phone"
                    placeholder="Phone Number"
                    required
                    class="w-full border border-gray-300 p-4 rounded-xl mb-5 focus:outline-none focus:ring-2 focus:ring-amber-500">

                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    required
                    class="w-full border border-gray-300 p-4 rounded-xl mb-5 focus:outline-none focus:ring-2 focus:ring-amber-500">

                <textarea
                    name="address"
                    rows="4"
                    placeholder="Delivery Address"
                    required
                    class="w-full border border-gray-300 p-4 rounded-xl mb-5 focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>

                <!-- Payment Method -->
                <select
                    name="payment_method"
                    class="w-full border border-gray-300 p-4 rounded-xl mb-6 focus:outline-none focus:ring-2 focus:ring-amber-500">

                    <option value="Cash On Delivery">
                        Cash On Delivery
                    </option>

                    <option value="UPI">
                        UPI Payment
                    </option>

                </select>

                <button
                    type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl text-lg font-bold transition duration-300">

                    Place Order

                </button>

            </form>

        </div>

    </div>

</section>

{% endblock %}
